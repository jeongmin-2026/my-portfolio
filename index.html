<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포트폴리오</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow-x: hidden;
        }

        /* 섹션 공통 스타일 */
        section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
        }

        /* 표지 */
        .cover {
            background: linear-gradient(135deg, #000 0%, #1a1a1a 100%);
            flex-direction: column;
        }

        .cover img {
            max-width: 90%;
            max-height: 80vh;
            object-fit: contain;
            margin: 20px 0;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(255,255,255,0.1);
        }

        /* 소개 섹션 */
        .intro {
            background: #0f0f0f;
            flex-direction: column;
            text-align: center;
        }

        .intro h1 {
            font-size: 3.5rem;
            font-weight: 300;
            letter-spacing: -1px;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .intro p {
            font-size: 1.2rem;
            color: #999;
            max-width: 600px;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .scroll-hint {
            margin-top: 50px;
            color: #666;
            font-size: 0.9rem;
        }

        /* 프로젝트 썸네일 그리드 */
        .projects-grid {
            background: #0a0a0a;
            flex-direction: column;
        }

        .projects-grid h2 {
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 60px;
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 40px;
            max-width: 1400px;
            width: 100%;
        }

        .project-card {
            position: relative;
            cursor: pointer;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.4s ease;
            background: #1a1a1a;
            text-decoration: none;
            color: inherit;
        }

        .project-card:hover {
            transform: translateY(-10px);
        }

        .project-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            display: block;
        }

        .project-info {
            padding: 25px;
        }

        .project-info h3 {
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 10px;
        }

        .project-info p {
            color: #888;
            font-size: 0.95rem;
        }

        /* 개별 프로젝트 상세 섹션 */
        .project-detail {
            background: #0f0f0f;
            flex-direction: column;
            padding: 80px 20px;
        }

        .project-detail h2 {
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 50px;
            text-align: center;
        }

        /* 수평 스크롤 갤러리 */
        .scroll-gallery {
            display: flex;
            gap: 30px;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 20px 0;
            max-width: 100%;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }

        .scroll-gallery::-webkit-scrollbar {
            height: 8px;
        }

        .scroll-gallery::-webkit-scrollbar-track {
            background: #1a1a1a;
            border-radius: 4px;
        }

        .scroll-gallery::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }

        .scroll-gallery::-webkit-scrollbar-thumb:hover {
            background: #666;
        }

        .gallery-item {
            flex: 0 0 auto;
            scroll-snap-align: center;
        }

        .gallery-item img {
            height: 70vh;
            width: auto;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .back-to-top {
            text-align: center;
            margin-top: 60px;
        }

        .back-to-top a {
            color: #888;
            text-decoration: none;
            font-size: 1rem;
            padding: 15px 30px;
            border: 1px solid #333;
            border-radius: 30px;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .back-to-top a:hover {
            border-color: #666;
            color: #fff;
        }

        /* 반응형 */
        @media (max-width: 768px) {
            .intro h1 {
                font-size: 2rem;
            }
            
            .project-detail h2 {
                font-size: 1.8rem;
            }
            
            .grid {
                grid-template-columns: 1fr;
            }
            
            .gallery-item img {
                height: 50vh;
            }
        }
    </style>
</head>
